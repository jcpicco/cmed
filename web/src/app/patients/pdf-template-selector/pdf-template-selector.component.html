<div class="pdf-selector">
  <label for="pdfFlowSelector">Tipo de documento</label>
  <div class="select-wrapper">
    <select
      id="pdfFlowSelector"
      class="form-control"
      [ngModel]="selectedValue"
      (ngModelChange)="onFlowChange($event)"
    >
      <option value="legacy">Historial clínico</option>
      <option *ngFor="let template of templates" [value]="template.id">
        {{ template.name }}
      </option>
    </select>
    <span class="select-arrow" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </span>
  </div>
</div>
